<link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect"/>

<body class="bg-background-light dark:bg-background-dark font-display text-gray-800 dark:text-white">
<div class="relative flex h-screen min-h-screen w-full flex-col justify-between">

<button class="text-gray-800 dark:text-white">
<svg fill="currentColor" height="24" viewBox="0 0 256 256" width="24" xmlns="http://www.w3.org/2000/svg">

<div class="bg-primary/10 dark:bg-primary/20 rounded-full p-4 mb-6">

                    how_to_vote
                </span>
</div>

<p class="text-gray-600 dark:text-gray-400 max-w-sm">

            </p>
<button class="mt-8 w-full max-w-xs bg-primary text-white font-bold py-3 rounded-lg text-sm tracking-wide">

            </button>
<button class="mt-4 w-full max-w-xs bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white font-bold py-3 rounded-lg text-sm tracking-wide">

            </button>
</main>
<nav class="flex justify-around bg-background-light dark:bg-background-dark border-t border-gray-200 dark:border-gray-800 p-2">
<a class="flex flex-col items-center justify-center gap-1 text-primary w-1/5" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-xs font-medium">Home</span>
</a>
<a class="flex flex-col items-center justify-center gap-1 text-gray-500 dark:text-gray-400 w-1/5" href="#">
