<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Submit Service Order</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#1193d4",
                "background-light": "#f6f7f8",
                "background-dark": "#101c22",
              },
              fontFamily: {
                "display": ["Manrope"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-2xl mx-auto bg-white dark:bg-slate-900 min-h-screen shadow-xl">
<!-- Top App Bar -->
<div class="flex items-center p-4 border-b border-slate-200 dark:border-slate-800 sticky top-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-10">
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined block text-slate-700 dark:text-slate-300">arrow_back</span>
</button>
<h1 class="text-xl font-bold ml-2 flex-1">Submit Service Order</h1>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined block text-slate-700 dark:text-slate-300">more_vert</span>
</button>
</div>
<div class="p-6 space-y-8">
<!-- Basic Information Section -->
<section class="space-y-4">
<h2 class="text-sm font-bold uppercase tracking-wider text-primary">Resident Details</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Unit Address</label>
<input class="form-input w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary h-12" placeholder="e.g. Apt 4B, Sunset Towers" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Name of Occupant</label>
<input class="form-input w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary h-12" placeholder="Full name" type="text"/>
</div>
</div>
</section>
<!-- Maintenance Request Details -->
<section class="space-y-4">
<h2 class="text-sm font-bold uppercase tracking-wider text-primary">Issue Description</h2>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Details of the Issue</label>
<textarea class="form-input w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary p-3" placeholder="Describe the maintenance problem in detail..." rows="4"></textarea>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Maintenance Person <span class="text-xs font-normal opacity-60">(Optional)</span></label>
<select class="form-select w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary h-12">
<option value="">Select a preferred technician</option>
<option value="1">John Smith (Plumbing)</option>
<option value="2">Maria Garcia (Electrical)</option>
<option value="3">David Chen (General)</option>
</select>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Satisfaction Rate <span class="text-xs font-normal opacity-60">(Pre-fill for follow-up)</span></label>
<div class="flex gap-2 h-12 items-center">
<button class="flex-1 h-full rounded-lg border border-slate-200 dark:border-slate-700 flex items-center justify-center hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-yellow-500">star</span>
</button>
<button class="flex-1 h-full rounded-lg border border-slate-200 dark:border-slate-700 flex items-center justify-center hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-yellow-500">star</span>
</button>
<button class="flex-1 h-full rounded-lg border border-slate-200 dark:border-slate-700 flex items-center justify-center hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-yellow-500">star</span>
</button>
<button class="flex-1 h-full rounded-lg border border-slate-200 dark:border-slate-700 flex items-center justify-center hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-300">star</span>
</button>
<button class="flex-1 h-full rounded-lg border border-slate-200 dark:border-slate-700 flex items-center justify-center hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-300">star</span>
</button>
</div>
</div>
</div>
</section>
<!-- Dates Section -->
<section class="space-y-4">
<h2 class="text-sm font-bold uppercase tracking-wider text-primary">Scheduling</h2>
<div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-100 dark:border-slate-800">
<div class="flex items-center justify-between mb-4">
<button class="p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full">
<span class="material-symbols-outlined text-sm">chevron_left</span>
</button>
<span class="font-bold text-slate-900 dark:text-slate-100">October 2023</span>
<button class="p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full">
<span class="material-symbols-outlined text-sm">chevron_right</span>
</button>
</div>
<div class="grid grid-cols-7 text-center text-[10px] font-bold text-slate-400 mb-2">
<span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
</div>
<div class="grid grid-cols-7 gap-1">
<!-- Simplified Calendar Grid -->
<div class="h-10 flex items-center justify-center text-slate-400">24</div>
<div class="h-10 flex items-center justify-center text-slate-400">25</div>
<div class="h-10 flex items-center justify-center text-slate-400">26</div>
<div class="h-10 flex items-center justify-center text-slate-400">27</div>
<div class="h-10 flex items-center justify-center text-slate-400">28</div>
<div class="h-10 flex items-center justify-center text-slate-400">29</div>
<div class="h-10 flex items-center justify-center text-slate-400">30</div>
<div class="h-10 flex items-center justify-center font-medium bg-primary text-white rounded-full">1</div>
<div class="h-10 flex items-center justify-center font-medium">2</div>
<div class="h-10 flex items-center justify-center font-medium">3</div>
<div class="h-10 flex items-center justify-center font-medium">4</div>
<div class="h-10 flex items-center justify-center font-medium border border-primary/30 rounded-full text-primary">5</div>
<div class="h-10 flex items-center justify-center font-medium">6</div>
<div class="h-10 flex items-center justify-center font-medium">7</div>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Date Submitted</label>
<div class="relative">
<input class="form-input w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800/50 bg-slate-50 focus:ring-0 h-12 pl-10" readonly="" type="text" value="Oct 24, 2023"/>
<span class="material-symbols-outlined absolute left-3 top-3 text-slate-400">calendar_today</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Preferred Completion <span class="text-xs font-normal opacity-60">(Optional)</span></label>
<div class="relative">
<input class="form-input w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary h-12 pl-10" placeholder="Select date" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-3 text-slate-400">event_available</span>
</div>
</div>
</div>
</section>
<!-- Action Buttons -->
<div class="pt-6 border-t border-slate-100 dark:border-slate-800 flex gap-4">
<button class="flex-1 py-4 px-6 rounded-xl border border-slate-200 dark:border-slate-700 font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                    Save Draft
                </button>
<button class="flex-[2] py-4 px-6 rounded-xl bg-primary text-white font-bold hover:brightness-110 shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">send</span>
                    Submit Order
                </button>
</div>
<p class="text-center text-xs text-slate-400 pb-10">
                A copy of this report will be sent to the property management office and the resident's registered email.
            </p>
</div>
</div>
</body></html>
